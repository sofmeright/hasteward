version: 1

vars:
  org: prplanit
  repo: hasteward
  github_repo: HASteward

sources:
  primary:
    kind: git
    worktree: "."
    url: "https://gitlab.prplanit.com/precisionplanit/{var:repo}"
    default_branch: "main"

policies:
  git_tags:
    stable: "^v?\\d+\\.\\d+\\.\\d+$"
    prerelease: "^v?\\d+\\.\\d+\\.\\d+-.+"
  branches:
    main: "^main$"

builds:
  - id: hasteward
    kind: docker
    platforms: [linux/amd64]

targets:
  # ── Docker Hub: stable releases ─────────────────────────────────
  - id: dockerhub-stable
    kind: registry
    build: hasteward
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "{version}"
      - "latest"
    when: { git_tags: [stable], events: [tag] }
    credentials: DOCKER

  # ── Docker Hub: pre-releases ────────────────────────────────────
  - id: dockerhub-prerelease
    kind: registry
    build: hasteward
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "{version}"
    when: { git_tags: [prerelease], events: [tag] }
    credentials: DOCKER

  # ── Docker Hub: dev builds on every commit ──────────────────────
  - id: dockerhub-dev
    kind: registry
    build: hasteward
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "dev-{sha:8}"
      - "latest-dev"
    when: { branches: [main], events: [push] }
    credentials: DOCKER
    retention:
      keep_last: 6
      protect: ["latest-dev"]

  # ── Docker Hub: README sync ─────────────────────────────────────
  - id: dockerhub-readme
    kind: docker-readme
    url: docker.io
    path: "{var:org}/{var:repo}"
    credentials: DOCKER
    when: { branches: [main], events: [push, tag] }
    file: "README.md"
    description: "High Availability Steward - database cluster recovery with restic-backed dedup backups"
    link_base: "https://gitlab.prplanit.com/precisionplanit/{var:repo}/blob/main"

  # ── Primary release ─────────────────────────────────────────────
  - id: primary-release
    kind: release
    aliases: ["{version}", "latest"]
    when: { git_tags: [stable], events: [tag] }

narrator:
  - file: "README.md"
    link_base: "https://github.com/{var:org}/{var:github_repo}/blob/main"
    items:
      - id: badge.release
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: release
        value: "v{version}"
        color: "#74ecbe"
        font: dejavu-sans
        font_size: 11
        output: ".stagefreight/badges/release.svg"
        link: "https://github.com/{var:org}/{var:github_repo}/releases"

      - id: badge.build
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: build
        value: "{env:BUILD_STATUS}"
        color: auto
        font: monofur
        output: ".stagefreight/badges/build.svg"
        link: "https://github.com/{var:org}/{var:github_repo}/actions"

      - id: badge.license
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: license
        value: "AGPL-3.0-only"
        color: "#310937"
        font: monofur
        output: ".stagefreight/badges/license.svg"
        link: LICENSE

      - id: badge.updated
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: updated
        value: "{env:BUILD_DATE}"
        color: "#236144"
        font: dejavu-sans
        font_size: 11
        output: ".stagefreight/badges/updated.svg"

      - id: shield.pulls
        kind: shield
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        shield: "docker/pulls/{var:org}/{var:repo}"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}"

lint:
  level: full
  exclude:
    - "src/assets/logo.png"
    - "ansible/**"
  modules:
    freshness:
      enabled: true
      options:
        cache_ttl: 300
        sources:
          docker_images: true
          docker_tools: true
          go_modules: true
        vulnerability:
          enabled: true
    tabs:
      enabled: true
    secrets:
      enabled: true
      exclude:
        - "go.sum"
    conflicts:
      enabled: true
    filesize:
      enabled: true
    unicode:
      enabled: true
      options:
        detect_bidi: true
        detect_zero_width: true
        detect_control_ascii: true

security:
  enabled: true
  sbom: true
  release_detail: full
