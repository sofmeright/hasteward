version: 1

vars:
  org: prplanit
  github_org: PrPlanIT
  gitlab_group: PrPlanIT
  repo: hasteward
  github_repo: HASteward

sources:
  primary:
    kind: git
    worktree: "."
    url: "https://gitlab.prplanit.com/{var:gitlab_group}/{var:repo}"
    default_branch: "main"

policies:
  git_tags:
    stable: "^v?\\d+\\.\\d+\\.\\d+$"
    prerelease: "^v?\\d+\\.\\d+\\.\\d+-.+"
  branches:
    main: "^main$"

builds:
  - id: hasteward
    kind: docker
    platforms: [linux/amd64]

targets:
  # ── Docker Hub: stable releases ─────────────────────────────────
  - id: dockerhub-stable
    kind: registry
    build: hasteward
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "{version}"
      - "latest"
    when: { git_tags: [stable], events: [tag] }
    credentials: DOCKER

  # ── Docker Hub: pre-releases ────────────────────────────────────
  - id: dockerhub-prerelease
    kind: registry
    build: hasteward
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "{version}"
    when: { git_tags: [prerelease], events: [tag] }
    credentials: DOCKER

  # ── Docker Hub: dev builds on every commit ──────────────────────
  - id: dockerhub-dev
    kind: registry
    build: hasteward
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "dev-{sha:8}"
      - "latest-dev"
    when: { branches: [main], events: [push] }
    credentials: DOCKER
    retention:
      keep_last: 5
      protect: ["latest-dev"]

  # ── Docker Hub: README sync ─────────────────────────────────────
  - id: dockerhub-readme
    kind: docker-readme
    url: docker.io
    path: "{var:org}/{var:repo}"
    credentials: DOCKER
    when: { branches: [main], events: [push, tag] }
    file: "README.md"
    description: "High Availability Steward - database cluster recovery with restic-backed dedup backups"
    link_base: "https://github.com/{var:github_org}/{var:github_repo}/blob/main"

  # ── Primary release ─────────────────────────────────────────────
  - id: primary-release
    kind: release
    aliases: ["{version}", "latest"]
    when: { git_tags: [stable], events: [tag] }

narrator:
  - file: "README.md"
    link_base: "https://github.com/{var:github_org}/{var:github_repo}/blob/main"
    items:
      # ── Project section (repo health & sources) ─────────────────
      - id: project.github
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "badge/GitHub-source-181717?logo=github"
        link: "https://github.com/{var:github_org}/{var:github_repo}"

      - id: project.gitlab
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "badge/GitLab-source-FC6D26?logo=gitlab"
        link: "https://gitlab.prplanit.com/{var:gitlab_group}/{var:repo}"

      - id: project.go-report
        kind: props
        type: go-report-card
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          module: "github.com/{var:github_org}/{var:github_repo}"

      - id: project.last-commit
        kind: props
        type: github-last-commit
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:org}/{var:github_repo}"

      - id: project.issues-open
        kind: props
        type: github-issues-open
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:org}/{var:github_repo}"

      - id: project.prs-open
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "github/issues-pr/{var:org}/{var:github_repo}"

      - id: project.contributors
        kind: props
        type: github-contributors
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:org}/{var:github_repo}"

      # ── Status badges ───────────────────────────────────────────
      - id: badge.build
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: build
        value: "{env:BUILD_STATUS}"
        color: auto
        font: monofur
        output: ".stagefreight/badges/build.svg"
        link: "https://gitlab.prplanit.com/{var:gitlab_group}/{var:repo}/-/pipelines"

      - id: badge.license
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: license
        value: "AGPL-3.0-only"
        color: "#310937"
        font: monofur
        output: ".stagefreight/badges/license.svg"
        link: LICENSE

      - id: badge.release
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: release
        value: "v{base}"
        color: "#74ecbe"
        font: dejavu-sans
        font_size: 11
        output: ".stagefreight/badges/release.svg"
        link: "https://github.com/{var:github_org}/{var:github_repo}/releases"

      - id: badge.updated
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: updated
        value: "{env:BUILD_DATE}"
        color: "#236144"
        font: dejavu-sans
        font_size: 11
        output: ".stagefreight/badges/updated.svg"

      - id: shield.donate
        kind: shield
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        shield: "badge/donate-FF5E5B?logo=ko-fi&logoColor=white"
        link: "https://ko-fi.com/T6T41IT163"

      - id: shield.sponsor
        kind: shield
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        shield: "badge/sponsor-EA4AAA?logo=githubsponsors&logoColor=white"
        link: "https://github.com/sponsors/{var:github_org}"

      # ── Image section ───────────────────────────────────────────
      # Row 1: Docker image + pulls
      - id: image.docker
        kind: shield
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        shield: "badge/Docker-{var:org}%2F{var:repo}-2496ED?logo=docker&logoColor=white"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}"

      - id: image.pulls
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: pulls
        value: "{docker.pulls}"
        color: "#1d63ed"
        output: ".stagefreight/badges/pulls.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}"

      - id: image.break1
        kind: break
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace

      # Row 2: All tag badges (release + dev)
      - id: image.release-latest
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: latest
        value: "v{base}"
        color: "#74ecbe"
        output: ".stagefreight/badges/latest.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest"

      - id: image.release-updated
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: updated
        value: "{docker.tag.v{base}.updated}"
        color: "#236144"
        output: ".stagefreight/badges/release-updated.svg"

      - id: image.release-size
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: size
        value: "{docker.tag.v{base}.size}"
        color: "#555"
        output: ".stagefreight/badges/release-size.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=v{base}"

      # Dev badges (same row)
      - id: image.dev-latest
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: latest-dev
        value: "dev-{sha:8}"
        color: "#3b82f6"
        output: ".stagefreight/badges/latest-dev.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest-dev"

      - id: image.dev-updated
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: updated
        value: "{docker.tag.latest-dev.updated}"
        color: "#236144"
        output: ".stagefreight/badges/dev-updated.svg"

      - id: image.dev-size
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: size
        value: "{docker.tag.latest-dev.size}"
        color: "#555"
        output: ".stagefreight/badges/dev-size.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest-dev"

lint:
  level: full
  exclude:
    - "src/assets/logo.png"
    - "src/assets/logo-192.png"
    - "ansible/**"
  modules:
    freshness:
      enabled: true
      options:
        cache_ttl: 300
        sources:
          docker_images: true
          docker_tools: true
          go_modules: true
        vulnerability:
          enabled: true
    tabs:
      enabled: true
    secrets:
      enabled: true
      exclude:
        - "go.sum"
    conflicts:
      enabled: true
    filesize:
      enabled: true
    unicode:
      enabled: true
      options:
        detect_bidi: true
        detect_zero_width: true
        detect_control_ascii: true

security:
  enabled: true
  sbom: true
  release_detail: full
